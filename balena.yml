name: nts-radio
type: sw.application
description: >-
  Stream NTS Radio on a Raspberry Pi Zero 2W with Pimoroni Pirate Audio.
  Supports live channels and infinite mixtapes.
version: "0.2.0"
assets:
  repository:
    type: blob.asset
    data:
      url: "https://github.com/saveriogzz/nts-balena"
data:
  defaultDeviceType: "raspberrypi0-2w-64"
  supportedDeviceTypes:
    - "raspberrypi0-2w-64"
    - "raspberry-pi2"
    - "raspberrypi3"
    - "raspberrypi3-64"
    - "raspberrypi4-64"
    - "raspberrypi5"
  applicationConfigVariables:
    - RESIN_HOST_CONFIG_dtparam: '"i2c_arm=on","spi=on","audio=off"'
    - RESIN_HOST_CONFIG_dtoverlay: '"vc4-kms-v3d,cma-320","hifiberry-dac"'
    - RESIN_HOST_CONFIG_gpio: '"25=op,dh"'
  applicationEnvironmentVariables:
    - NTS_DEFAULT_CHANNEL: 1
    - NTS_DISPLAY_BRIGHTNESS: 80
    - NTS_BUTTON_DEBOUNCE_MS: 200
